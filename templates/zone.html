<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ zone_name }}</title>
</head>
<body>
<h1>{{ zone_name }} <button id="onoff" onclick="doOnOff()"></button></h1>
<p><a href="/">Back</a></p>

<div id="display" style="font-family:monospace; background:#000; color:#0f0; padding:10px; width:320px; min-height:80px;">
  <div id="line1">&nbsp;</div>
  <div id="line2">&nbsp;</div>
  <div id="line3">&nbsp;</div>
  <div id="line4">&nbsp;</div>
</div>

<div style="margin-top:10px;">
  <img id="artwork" src="" alt="" style="display:none; max-width:200px; max-height:200px;">
</div>

<div style="margin-top:10px;">
  <button onclick="doAction('prev_track')">&lt;&lt; Prev</button>
  <button id="playpause" onclick="doAction('play_pause')">Play/Pause</button>
  <button onclick="doAction('next_track')">Next &gt;&gt;</button>
</div>

<div style="margin-top:10px;">
  Volume: <button onclick="doAction('volume_down')">&#8722;</button>
  <span id="volume">--</span>
  <button onclick="doAction('volume_up')">+</button>
</div>

<p id="zonestatus"></p>

<div style="margin-top:10px;" id="source-buttons"></div>

<div style="margin-top:10px;">
  <button onclick="toggleFavorites()">Favorites</button>
</div>
<ul id="favorites-list" style="display:none; list-style:none; padding:0; margin-top:5px; max-height:300px; overflow-y:auto;"></ul>

<script>
var zoneId = {{ zone_id }};
var zoneIsOn = false;
var currentSource = 0;

function doAction(action) {
  fetch('/api/zone/' + zoneId + '/action?action=' + action);
}

function doOnOff() {
  if (zoneIsOn) {
    doAction('zone_off');
    zoneIsOn = false;
    document.getElementById('onoff').textContent = 'Turn On';
  } else {
    doAction('zone_on');
    zoneIsOn = true;
    document.getElementById('onoff').textContent = 'Turn Off';
  }
}

function setSource(sourceId) {
  fetch('/api/zone/' + zoneId + '/action?action=set_source&source_id=' + sourceId);
}

function updateDisplay(data) {
  document.getElementById('line1').textContent = data.lines[0] || ' ';
  document.getElementById('line2').textContent = data.lines[1] || ' ';
  document.getElementById('line3').textContent = data.lines[2] || ' ';
  document.getElementById('line4').textContent = data.lines[3] || ' ';

  var button = document.getElementById('playpause');
  button.textContent = data.mode === 'play' ? 'Pause' : 'Play';

  zoneIsOn = data.is_on;
  currentSource = data.source;
  document.getElementById('onoff').textContent = data.is_on ? 'Turn Off' : 'Turn On';
  document.getElementById('zonestatus').textContent = data.is_on ? ('Source ' + data.source) : 'Off';
  document.getElementById('volume').textContent = data.volume !== null ? data.volume : '--';

  var img = document.getElementById('artwork');
  if (data.artwork_url) {
    img.src = data.artwork_url;
    img.style.display = '';
  } else {
    img.src = '';
    img.style.display = 'none';
  }

  updateSourceButtons();
}

function updateSourceButtons() {
  var buttons = document.getElementById('source-buttons').querySelectorAll('button');
  for (var i = 0; i < buttons.length; i++) {
    var button = buttons[i];
    var sourceId = parseInt(button.dataset.sourceId);
    if (zoneIsOn && sourceId === currentSource) {
      button.style.fontWeight = 'bold';
    } else {
      button.style.fontWeight = '';
    }
  }
}

function poll() {
  fetch('/api/zone/' + zoneId + '/status')
    .then(function(response) { return response.json(); })
    .then(updateDisplay);
}

poll();
setInterval(poll, 1000);

fetch('/api/sources')
  .then(function(response) { return response.json(); })
  .then(function(data) {
    var container = document.getElementById('source-buttons');
    data.sources.forEach(function(source) {
      var button = document.createElement('button');
      button.textContent = source.name;
      button.dataset.sourceId = source.id;
      button.onclick = function() { setSource(source.id); };
      container.appendChild(button);
    });
    updateSourceButtons();
  });

var favoritesLoaded = false;

function toggleFavorites() {
  var list = document.getElementById('favorites-list');
  if (list.style.display === 'none') {
    list.style.display = '';
    if (!favoritesLoaded) {
      loadFavorites();
    }
  } else {
    list.style.display = 'none';
  }
}

function loadFavorites() {
  fetch('/api/zone/' + zoneId + '/favorites')
    .then(function(response) { return response.json(); })
    .then(function(data) {
      favoritesLoaded = true;
      var list = document.getElementById('favorites-list');
      list.textContent = '';
      data.favorites.forEach(function(favorite) {
        var item = document.createElement('li');
        var button = document.createElement('button');
        button.textContent = favorite.name;
        button.onclick = function() {
          fetch('/api/zone/' + zoneId + '/action?action=play_favorite&favorite_id=' + encodeURIComponent(favorite.id));
        };
        item.appendChild(button);
        list.appendChild(item);
      });
    });
}
</script>
</body>
</html>
